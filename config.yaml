# photo-promo 配置中枢
# 四档硬件 + 模型 + 阈值 + prompt 全在这切，只改 config 不改代码。

# 硬件档位：cpu / small_gpu / large_gpu / mac
# 影响模型加载的 device 选择（Phase 2/3 用）。老电脑先用 cpu 跑通。
hardware: cpu

# 状态机数据库（派生，可删重建）
db_path: pipeline.db

# 输出目录
out_dir: out

# ---- L0 元数据筛（Phase 1 实现）----
l0:
  min_width: 640        # 小于此宽淘汰
  min_height: 480       # 小于此高淘汰
  blur_threshold: 100.0 # 拉普拉斯方差，低于此判模糊
  dark_threshold: 40    # 平均亮度，低于此判过暗
  bright_threshold: 220 # 平均亮度，高于此判过曝

# ---- L1 SigLIP 粗筛（Phase 2 实现）----
l1:
  model: google/siglip2-base-patch16-224
  device: cpu           # 跟随 hardware，可单独覆盖
  top_percent: 20       # 保留适配度 Top N%
  prompt_file: prompts/l1_screen.txt

# ---- L2 VLM 精筛 + 结构化语义描述（Phase 3 实现）----
# 出口是照片库 vault，不是文案；描述 schema 见 docs/io-contract.md §3.3
l2:
  provider: ark         # 默认火山方舟 Ark；可切其他 provider
  # ⚠ 模型需在火山方舟控制台「开通管理」激活后才能调（账号 2129097397 当前未开通任何 vision 模型）
  #   开通入口: https://console.volcengine.com/ark/region:ark+cn-beijing/openManagement
  #   备选(账号已识别、待激活): doubao-1-5-vision-pro-32k-250115 / doubao-seed-1-6-flash-250615
  model: doubao-seed-1-6-250615          # doubao 多模态模型名，或推理接入点 ID（ep-xxxx）
  base_url: https://ark.cn-beijing.volces.com/api/v3  # OpenAI 兼容
  # API key 不写这里，从环境变量 ARK_API_KEY 读（见 .env.example）
  top_n: 50             # 最多送多少张给 VLM 精筛+描述
  prompt_file: prompts/l2_describe.txt
  require_quality_gate: true   # 保留精筛门槛：VLM 判不合格的不入库（见 io-contract §3.5）

# ---- 导出照片库 vault（Phase 4 实现）----
# 把 l2_done 入库图导出成 library/（index.md + photos/ + images/）；结构见 io-contract §3
export:
  dir: library          # vault 输出目录（相对项目根）
  copy_images: true     # true=复制原图到 images/（vault 自包含）；false=软链
  id_len: 12            # <id> 取内容 sha256 的前 N 位（去重友好、稳定）
  # related 自动建链：scene 相同 且 taken_at 相差 ≤ link_window_min 分钟
  link_window_min: 30   # 时间邻近窗口（分钟）；两图都有 taken_at 才参与
